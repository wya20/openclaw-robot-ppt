<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw智能铁道机车探伤机器人系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js-appearance/plugin/appearance/appearance.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

    :root {
      --r-background-color: #0a0e27;
      --r-main-font: 'Noto Sans SC', 'Source Han Sans SC', sans-serif;
      --r-heading-font: 'Noto Sans SC', 'Source Han Sans SC', sans-serif;
      --r-main-color: #e0e0e0;
      --r-heading-color: #4FC3F7;
      --r-link-color: #4FC3F7;
      --r-main-size: 18px;
    }

    * {
      box-sizing: border-box;
    }

    .reveal .slides {
      text-align: left;
    }

    .reveal .slides section {
      height: 100%;
      padding: 20px 40px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    .reveal .slides section .bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0.2;
      z-index: 0;
    }

    .reveal .slides section .content-wrapper {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .reveal .slides section .content-image {
      position: absolute;
      right: 2%;
      top: 15%;
      width: 35%;
      opacity: 0.38;
      z-index: 1;
      filter: drop-shadow(0 4px 20px rgba(0, 212, 255, 0.3));
      transition: transform 0.4s ease, filter 0.4s ease, opacity 0.4s ease;
    }

    .reveal .slides section .content-image:hover {
      transform: translateY(-10px) scale(1.05) rotateZ(-1deg);
      filter: drop-shadow(0 20px 40px rgba(0, 212, 255, 0.5));
      opacity: 0.6;
    }

    .reveal .slides section h1 {
      font-size: 2em;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.2em;
      text-shadow: 0 0 30px rgba(79, 195, 247, 0.5);
      line-height: 1.2;
    }

    .reveal .slides section h2 {
      font-size: 1.3em;
      font-weight: 700;
      color: #4FC3F7;
      margin-bottom: 0.3em;
      text-shadow: 0 0 20px rgba(79, 195, 247, 0.4);
      line-height: 1.3;
    }

    .reveal .slides section h3 {
      font-size: 1.1em;
      font-weight: 500;
      color: #81D4FA;
      margin-bottom: 0.3em;
      line-height: 1.4;
    }

    .reveal .slides section p {
      font-size: 0.7em;
      line-height: 1.35;
      color: #e0e0e0;
      margin-bottom: 0.4em;
    }

    .reveal .slides section ul {
      font-size: 0.65em;
      line-height: 1.4;
      color: #bdbdbd;
      margin-left: 1em;
    }

    .reveal .slides section li {
      margin-bottom: 0.2em;
    }

    .reveal .slides section .text-content {
      width: 58%;
      font-size: 0.9em;
      line-height: 1.4;
    }

    .reveal .slides section .text-content p {
      font-size: 1em;
    }

    .reveal .slides section .section-title {
      text-align: center;
      padding: 20px;
    }

    .reveal .slides section .section-title h1 {
      font-size: 2.2em;
      margin-bottom: 0.2em;
    }

    .reveal .slides section .section-title h2 {
      font-size: 1.6em;
      color: #4FC3F7;
    }

    .reveal .slides section .toc-content {
      font-size: 0.95em;
      line-height: 2;
      color: #ffffff;
    }

    .reveal .slides section .toc-content strong {
      color: #FFD700;
    }

    .cover-content {
      text-align: center;
      position: relative;
      z-index: 2;
      background: transparent;
    }

    .cover-content h1 {
      font-size: 2.8em;
      margin-bottom: 0.3em;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 0, 0, 0.5);
    }

    .cover-content h2 {
      font-size: 1.5em;
      color: #81D4FA;
      text-shadow: 0 0 15px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 0, 0, 0.5);
    }

    #cover-video {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      object-fit: cover;
      z-index: 0;
    }

    .reveal .slides section.cover-slide {
      background: transparent;
      overflow: hidden;
    }

    .reveal .slides section.cover-slide .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 1;
    }

    .reveal .slides section.cover-slide .cover-content {
      position: relative;
      z-index: 2;
    }

    .highlight {
      color: #4FC3F7;
      font-weight: 500;
    }

    .text-small {
      font-size: 0.6em !important;
      line-height: 1.3 !important;
    }

    .text-xsmall {
      font-size: 0.55em !important;
      line-height: 1.25 !important;
    }

    .columns-2 {
      display: flex;
      gap: 30px;
    }

    .columns-2 .col {
      flex: 1;
    }

    .columns-3 {
      display: flex;
      gap: 20px;
    }

    .columns-3 .col {
      flex: 1;
    }

    .page-number {
      position: absolute;
      bottom: 15px;
      right: 20px;
      font-size: 0.6em;
      color: #666;
      z-index: 10;
    }

    .ending-content {
      text-align: center;
    }

    .ending-content h1 {
      font-size: 3em;
      margin-bottom: 0.5em;
    }

    .reveal .slides section .fragment {
      opacity: 0;
      visibility: hidden;
    }

    .reveal .slides section .fragment.visible {
      opacity: 1;
      visibility: visible;
    }

    .reveal .progress {
      color: #4FC3F7;
      height: 3px;
    }

    .reveal .controls {
      color: #4FC3F7;
    }

    .bg-gradient-1 {
      background: linear-gradient(135deg, #0a0e27 0%, #1a237e 50%, #0d47a1 100%);
    }

    .bg-gradient-2 {
      background: linear-gradient(135deg, #0a0e27 0%, #1b3a5f 50%, #0a2540 100%);
    }

    .bg-gradient-3 {
      background: linear-gradient(135deg, #0a0e27 0%, #2d1b4e 50%, #1a0a2e 100%);
    }

    .bg-gradient-4 {
      background: linear-gradient(135deg, #0a0e27 0%, #004d40 50%, #00695c 100%);
    }

    .text-box {
      border: 1px solid rgba(79, 195, 247, 0.4);
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 6px;
      background: rgba(10, 14, 39, 0.6);
      backdrop-filter: blur(5px);
      box-shadow: 0 0 15px rgba(79, 195, 247, 0.1), inset 0 0 10px rgba(79, 195, 247, 0.05);
      animation: breatheGlow 3s ease-in-out infinite;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .text-box:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 15px 40px rgba(79, 195, 247, 0.3), 0 0 30px rgba(79, 195, 247, 0.2), inset 0 0 15px rgba(79, 195, 247, 0.1);
      border-color: rgba(79, 195, 247, 0.8);
    }

    @keyframes breatheGlow {
      0%, 100% {
        box-shadow: 0 0 15px rgba(79, 195, 247, 0.1), inset 0 0 10px rgba(79, 195, 247, 0.05);
        border-color: rgba(79, 195, 247, 0.4);
      }
      50% {
        box-shadow: 0 0 25px rgba(79, 195, 247, 0.25), inset 0 0 15px rgba(79, 195, 247, 0.1);
        border-color: rgba(79, 195, 247, 0.6);
      }
    }

    .text-box.animate-in {
      animation: boxAssemble 0.6s ease-out forwards, breatheGlow 3s ease-in-out infinite;
    }

    .text-box.animate-out {
      animation: boxScatter 0.4s ease-in forwards;
    }

    @keyframes boxAssemble {
      0% {
        opacity: 0;
        transform: translate(-300px, -150px) rotateY(-60deg) scale(0.2);
      }
      50% {
        opacity: 1;
        transform: translate(20px, 10px) rotateY(8deg) scale(1.05);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) rotateY(0) scale(1);
      }
    }

    @keyframes boxScatter {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(300px, 150px) rotateY(60deg) scale(0.2);
      }
    }

    .content-image.animate-in {
      animation: imageSlideIn 0.7s ease-out forwards;
    }

    .content-image.animate-out {
      animation: imageSlideOut 0.4s ease-in forwards;
    }

    @keyframes imageSlideIn {
      0% {
        opacity: 0;
        transform: translateX(500px) rotateY(-80deg) scale(0.1);
      }
      50% {
        opacity: 0.8;
        transform: translateX(-20px) rotateY(10deg) scale(1.08);
      }
      100% {
        opacity: 0.4;
        transform: translateX(0) rotateY(0) scale(1);
      }
    }

    @keyframes imageSlideOut {
      0% {
        opacity: 0.4;
        transform: translateX(0) rotateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateX(-500px) rotateY(-60deg) scale(0.1);
      }
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <section class="cover-slide" data-background-video="outputs/cover-loop.mp4" data-background-video-loop data-background-video-muted data-autoplay>
        <div class="video-overlay"></div>
        <div class="cover-content">
          <h1>OpenClaw智能铁道机车探伤机器人系统</h1>
          <h2>AI革命从数字走向物理世界</h2>
        </div>
        <div class="page-number">1 / 50</div>
      </section>
